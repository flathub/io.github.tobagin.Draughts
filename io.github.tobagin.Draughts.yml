app-id: io.github.tobagin.Draughts
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: draughts

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network

modules:
  - name: draughts
    buildsystem: meson
    config-opts:
      - -Dprofile=default
    sources:
      - type: git
        url: https://github.com/tobagin/Draughts.git
        tag: v2.2.0
        commit: cce44d1d6ef1cf17cbe6f38fdd6d8a96c0e2d939